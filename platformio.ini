; PlatformIO project for the LilyGo SMS -> Telegram bridge.
;
; This project reuses the TinyGSM fork and board definitions shipped with
; the upstream LilyGo-Modem-Series repo, which is expected to live as a
; sibling directory (../LilyGo-Modem-Series).
;
; Pick the env matching your board below, or add a new one mirroring the
; upstream platformio.ini.

[platformio]
default_envs = T-A7670X
src_dir = src
boards_dir = ../LilyGo-Modem-Series/boards

[env]
platform = espressif32@6.11.0
framework = arduino
monitor_speed = 115200
lib_extra_dirs =
    ../LilyGo-Modem-Series/lib
lib_deps =
    bblanchon/ArduinoJson@^6.21.5

[esp32dev_base]
board = esp32dev
build_flags =
    ${env.build_flags}
    -mfix-esp32-psram-cache-issue
    -DBOARD_HAS_PSRAM
; Embed the CA trust bundle into flash so WiFiClientSecure::setCACertBundle()
; can verify TLS connections to api.telegram.org without a runtime download.
; See rfc/0001-tls-cert-pinning.md and data/cert/README.md for the source of
; this blob and the regeneration steps.
board_build.embed_files = data/cert/x509_crt_bundle.bin
monitor_filters =
    default
    esp32_exception_decoder

[esp32s3_base]
board = esp32s3box
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
monitor_filters =
    time
    default
    esp32_exception_decoder

[env:T-A7670X]
extends = esp32dev_base
build_flags =
    ${esp32dev_base.build_flags}
    -DLILYGO_T_A7670

[env:T-A7608X]
extends = esp32dev_base
build_flags =
    ${esp32dev_base.build_flags}
    -DLILYGO_T_A7608X

[env:T-A7608X-S3]
extends = esp32s3_base
build_flags =
    ${esp32s3_base.build_flags}
    -DLILYGO_T_A7608X_S3

[env:T-PCIE-A7670X]
extends = esp32dev_base
build_flags =
    ${esp32dev_base.build_flags}
    -DLILYGO_T_PCIE_A767X

; ---------- native (host) unit tests ----------
;
; Compiles the pure helpers (sms_codec.cpp) and SmsHandler
; (sms_handler.cpp) against a hand-rolled Arduino.h stub under
; test/support/. Everything else in src/ is excluded — main.cpp,
; telegram.cpp, real_modem.h etc. all have hard hardware dependencies.
;
; Run with:
;   "$PIO" test -e native                   # runs all test_* folders
;   "$PIO" test -e native -f test_native    # explicit folder filter
;
; Requires a native g++ / gcc in PATH (MinGW-w64 works; Unity is
; installed automatically into .pio/libdeps/native/).
[env:native]
platform = native
framework =
test_framework = unity
test_build_src = true
build_src_filter =
    +<sms_codec.cpp>
    +<sms_handler.cpp>
    +<call_handler.cpp>
    +<reply_target_map.cpp>
    +<sms_sender.cpp>
    +<telegram_poller.cpp>
    -<main.cpp>
    -<telegram.cpp>
build_flags =
    -std=gnu++17
    -Isrc
    -Itest/support
build_src_flags =
    -std=gnu++17
    -Isrc
    -Itest/support
lib_deps =
lib_extra_dirs =
lib_ignore =
    ArduinoJson
    TinyGSM
