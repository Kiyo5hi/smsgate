; PlatformIO project for the LilyGo SMS -> Telegram bridge.
;
; This project reuses the TinyGSM fork and board definitions shipped with
; the upstream LilyGo-Modem-Series repo, which is expected to live as a
; sibling directory (../LilyGo-Modem-Series).
;
; Pick the env matching your board below, or add a new one mirroring the
; upstream platformio.ini.

[platformio]
default_envs = T-A7670X
src_dir = src
boards_dir = ../LilyGo-Modem-Series/boards

[env]
platform = espressif32@6.11.0
framework = arduino
monitor_speed = 115200
lib_extra_dirs =
    ../LilyGo-Modem-Series/lib
lib_deps =
    bblanchon/ArduinoJson@^6.21.5

[esp32dev_base]
board = esp32dev
build_flags =
    ${env.build_flags}
    -mfix-esp32-psram-cache-issue
    -DBOARD_HAS_PSRAM
monitor_filters =
    default
    esp32_exception_decoder

[esp32s3_base]
board = esp32s3box
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
monitor_filters =
    time
    default
    esp32_exception_decoder

[env:T-A7670X]
extends = esp32dev_base
build_flags =
    ${esp32dev_base.build_flags}
    -DLILYGO_T_A7670

[env:T-A7608X]
extends = esp32dev_base
build_flags =
    ${esp32dev_base.build_flags}
    -DLILYGO_T_A7608X

[env:T-A7608X-S3]
extends = esp32s3_base
build_flags =
    ${esp32s3_base.build_flags}
    -DLILYGO_T_A7608X_S3

[env:T-PCIE-A7670X]
extends = esp32dev_base
build_flags =
    ${esp32dev_base.build_flags}
    -DLILYGO_T_PCIE_A767X
