name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC daily
  workflow_dispatch:        # allow manual trigger from the Actions tab

# Short path avoids ESP-IDF's Windows path-length limits (irrelevant on Linux,
# but keeps the env var consistent with the local Windows build guide).
env:
  CARGO_TARGET_DIR: /tmp/t

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Rust stable (for non-Xtensa host tools) ────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      # ── Xtensa toolchain cache ─────────────────────────────────────────────
      # Cache key includes a version token; bump it to force a fresh install.
      - name: Cache Xtensa toolchain
        id: toolchain-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/esp
            ~/.rustup/toolchains/xtensa-esp32-elf*
            ~/.rustup/toolchains/xtensa-esp-elf*
          key: xtensa-toolchain-${{ runner.os }}-v1

      - name: Install Xtensa toolchain (espup)
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: |
          cargo install espup --locked
          espup install

      # Export the env vars written by espup's export script so subsequent
      # steps (which run in separate shell processes) can use the toolchain.
      - name: Export Xtensa environment
        run: |
          source "$HOME/export-esp.sh"
          echo "PATH=$PATH"               >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> "$GITHUB_ENV"

      # ── config.toml ────────────────────────────────────────────────────────
      - name: Generate config.toml
        env:
          WIFI_SSID:            ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD:        ${{ secrets.WIFI_PASSWORD }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          UI_LOCALE:            ${{ secrets.UI_LOCALE || 'en' }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
        run: python3 .github/scripts/gen_config.py > config.toml

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build firmware
        run: cargo +esp build --release --target xtensa-esp32-espidf

      # ── Convert ELF → app binary ───────────────────────────────────────────
      # EspOta::write() expects the ESP32 app image format (magic byte 0xE9),
      # not the ELF produced by cargo. Use espflash to convert.
      - name: Install espflash
        run: cargo install espflash --locked

      - name: Convert ELF to app binary
        run: |
          espflash save-image --chip esp32 \
            ${{ env.CARGO_TARGET_DIR }}/xtensa-esp32-espidf/release/smsgate \
            smsgate.bin

      # ── Generate partition table binary ───────────────────────────────────
      # esp-idf-sys downloads ESP-IDF to ~/.espressif during cargo build.
      # The gen_esp32part.py script converts the CSV to the binary that
      # espflash --partition-table expects for first-time flashing.
      - name: Generate partitions_ota.bin
        run: |
          GEN=$(find ~/.espressif -name "gen_esp32part.py" 2>/dev/null | head -1)
          if [ -z "$GEN" ]; then
            echo "::error::gen_esp32part.py not found under ~/.espressif"
            exit 1
          fi
          python3 "$GEN" partitions_ota.csv partitions_ota.bin

      # ── Publish nightly release ────────────────────────────────────────────
      # Delete the previous nightly tag + release first so the download URL
      # always points to the most recent build.
      - name: Delete previous nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly — ${{ github.sha }}"
          prerelease: true
          body: |
            Automated nightly firmware build.

            Flash for the first time with the partition table:
            ```
            espflash flash smsgate.bin --port <PORT> --partition-table partitions_ota.bin
            ```

            Subsequent updates via the `/update` bot command use this release automatically.
          files: |
            smsgate.bin
            partitions_ota.bin
