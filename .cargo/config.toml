[target.xtensa-esp32-espidf]
linker = "ldproxy"

[unstable]
build-std = ["std", "panic_abort"]

[env]
# `relative = true` makes Cargo resolve this against the workspace root,
# producing the absolute path that esp-idf-sys requires.
ESP_IDF_SDKCONFIG_DEFAULTS = { value = "sdkconfig.defaults", relative = true }
ESP_IDF_VERSION = "v5.2"
